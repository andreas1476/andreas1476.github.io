<style>
.staff-form {
    max-width: 700px;
    margin: auto;
    padding: 25px;
    background: #1e1e1e;
    border-radius: 10px;
    color: #ffffff;
    font-family: Arial, sans-serif;
}

.staff-form h2 {
    text-align: center;
    margin-bottom: 20px;
}

.staff-form label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
}

.staff-form input,
.staff-form textarea,
.staff-form select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 6px;
    border: none;
    font-size: 14px;
}

.staff-form textarea {
    min-height: 100px;
    resize: vertical;
}

.staff-form button {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    background: #ff6600;
    border: none;
    border-radius: 6px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.staff-form button:hover {
    background: #ff8533;
}
</style>

<div class="staff-form">
    <h2>📝 Staff Ansøgning</h2>

    <form action="#" method="post">

        <label>Fulde navn:</label>
        <input type="text" name="navn" required>

        <label>Alder:</label>
        <input type="number" name="alder" required>

        <label>Discord navn + ID:</label>
        <input type="text" name="discord" placeholder="Brugernavn#1234" required>

        <label>Steam / Ingame navn:</label>
        <input type="text" name="ingame" required>

        <label>Har du tidligere været staff?</label>
        <select name="tidligere_staff" required>
            <option value="">Vælg</option>
            <option value="Ja">Ja</option>
            <option value="Nej">Nej</option>
        </select>

        <label>Hvis ja, hvor og hvilken rolle?</label>
        <textarea name="erfaring_detaljer"></textarea>

        <label>Hvorfor vil du være staff hos os?</label>
        <textarea name="motivation" required></textarea>

        <label>Hvad kan du bidrage med?</label>
        <textarea name="bidrag" required></textarea>

        <label>Hvordan håndterer du konflikter?</label>
        <textarea name="konflikt" required></textarea>

        <label>Hvor mange timer kan du være aktiv om ugen?</label>
        <input type="text" name="timer" required>

        <button type="submit">Send Ansøgning</button>

    </form>
</div>
