<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resident RP Ansøgninger</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body {margin:0;font-family:'Poppins',sans-serif;background:#0b0b0b;color:white;}
nav {display:flex;justify-content:space-between;padding:20px 40px;background:#111;position:fixed;width:100%;top:0;z-index:1000;}
nav h2 {color:#f1c40f;}
nav a {color:white;margin-left:20px;text-decoration:none;}
header {height:30vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:#000;}
.section {padding:100px 20px 40px 20px;}
h2 {margin-bottom:20px;text-align:center;}
.form {max-width:600px;margin:auto;text-align:left;}
input, textarea {width:100%;padding:10px;margin:10px 0;border-radius:8px;border:none;background:#222;color:white;}
button {padding:8px 15px;border:none;border-radius:6px;background:#f1c40f;font-weight:bold;cursor:pointer;margin:3px;}
.grid {display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin-top:20px;}
.app-card {padding:20px;border-radius:10px;box-shadow:0 0 15px rgba(0,0,0,0.6);transition: transform 0.2s;position:relative;}
.app-card:hover {transform: translateY(-5px);}
.app-card h3 {margin:0 0 10px 0;text-align:center;}
.field {margin-bottom:8px;}
.field b {color:#f1c40f;}
.status-buttons {text-align:center;margin-top:10px;}
.status-buttons button {background:#333;color:white;}
.filter-buttons {text-align:center;margin-bottom:20px;}
.filter-buttons button {margin:0 5px;}
footer {padding:30px;background:#111;text-align:center;color:#777;}
.whitelist {border-top: 5px solid #f1c40f;}
.staff {border-top: 5px solid #00ccff;}
.bande {border-top: 5px solid #ff4d4d;}
.section:not(#login-section) {display:none;}
</style>
</head>
<body>

<nav>
<h2>Resident RP</h2>
<div>
<a href="#whitelist-section">Whitelist</a>
<a href="#staff-section">Staff</a>
<a href="#bande-section">Bande</a>
<a href="#apps-section">Ansøgninger</a>
</div>
</nav>

<header>
<h1>Resident RP Ansøgninger</h1>
<p>Udfyld ansøgning og se alle ansøgninger nedenfor</p>
</header>

<!-- LOGIN SECTION -->
<section id="login-section" class="section">
<h2>Log ind med Discord for at ansøge</h2>
<a id="discord-login" href="#">
<button style="padding:10px 20px;background:#7289da;color:white;border:none;border-radius:5px;cursor:pointer;">
Log ind med Discord
</button>
</a>
</section>

<!-- WHITELIST FORM -->
<section id="whitelist-section" class="section">
<h2>Whitelist Ansøgning</h2>
<div class="form">
<input id="w_q1" placeholder="Navn">
<input id="w_q2" placeholder="Alder">
<textarea id="w_q3" placeholder="Erfaring med RP"></textarea>
<textarea id="w_q4" placeholder="Hvorfor vil du spille hos os?"></textarea>
<textarea id="w_q5" placeholder="Tidligere servererfaring"></textarea>
<textarea id="w_q6" placeholder="Roller du kan spille"></textarea>
<input id="w_q7" placeholder="Hvor mange timer om ugen?"></input>
<textarea id="w_q8" placeholder="Hvordan vil du bidrage til RP-miljøet?"></textarea>
<textarea id="w_q9" placeholder="Kendskab til regler"></textarea>
<textarea id="w_q10" placeholder="Eventuelle kommentarer"></textarea>
<button onclick="submitApp('Whitelist')">Send Whitelist</button>
</div>
</section>

<!-- STAFF FORM -->
<section id="staff-section" class="section">
<h2>Staff Ansøgning</h2>
<div class="form">
<input id="s_q1" placeholder="Navn">
<input id="s_q2" placeholder="Alder">
<textarea id="s_q3" placeholder="Erfaring som staff"></textarea>
<textarea id="s_q4" placeholder="Hvorfor vil du være staff?"></textarea>
<textarea id="s_q5" placeholder="Hvilke staff roller kan du udfylde?"></textarea>
<textarea id="s_q6" placeholder="Konflikthåndtering erfaring"></textarea>
<input id="s_q7" placeholder="Hvor mange timer om ugen?"></input>
<textarea id="s_q8" placeholder="Tidligere staff erfaring"></textarea>
<textarea id="s_q9" placeholder="Kendskab til vores regler"></textarea>
<textarea id="s_q10" placeholder="Eventuelle kommentarer"></textarea>
<button onclick="submitApp('Staff')">Send Staff</button>
</div>
</section>

<!-- BANDE FORM -->
<section id="bande-section" class="section">
<h2>Bande Ansøgning</h2>
<div class="form">
<input id="b_q1" placeholder="Bande navn">
<input id="b_q2" placeholder="Antal medlemmer">
<textarea id="b_q3" placeholder="Planer for banden"></textarea>
<textarea id="b_q4" placeholder="Hvorfor oprette denne bande?"></textarea>
<textarea id="b_q5" placeholder="Roller i banden"></textarea>
<textarea id="b_q6" placeholder="Tidligere bande erfaring"></textarea>
<textarea id="b_q7" placeholder="Strategi for samarbejde"></textarea>
<textarea id="b_q8" placeholder="Hvilke typer aktiviteter vil I lave?"></textarea>
<textarea id="b_q9" placeholder="Eventuelle regler indenfor banden"></textarea>
<textarea id="b_q10" placeholder="Kontaktperson"></textarea>
<button onclick="submitApp('Bande')">Send Bande</button>
</div>
</section>

<!-- DISPLAY APPS -->
<section id="apps-section" class="section">
<h2>Ansøgninger</h2>
<div class="filter-buttons">
<button onclick="filterApps('All')">Alle</button>
<button onclick="filterApps('Whitelist')">Whitelist</button>
<button onclick="filterApps('Staff')">Staff</button>
<button onclick="filterApps('Bande')">Bande</button>
</div>
<div class="grid" id="apps"></div>
</section>

<footer>
<p>© Resident RP</p>
</footer>

<script>
// ----- DISCORD LOGIN -----
const DISCORD_CLIENT_ID = "DIN_CLIENT_ID_HER";
const REDIRECT_URI = encodeURIComponent("DIN_REDIRECT_URI_HER");
const SCOPE = "identify";

document.getElementById('discord-login').href = 
  `https://discord.com/api/oauth2/authorize?client_id=${DISCORD_CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=${SCOPE}`;

function getDiscordUser() {
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const token = params.get('access_token');

    if(token) {
        fetch("https://discord.com/api/users/@me", {
            headers: {Authorization: `Bearer ${token}`}
        })
        .then(res => res.json())
        .then(user => {
            localStorage.setItem('discordLoggedIn', 'true');
            // Gem både tag og unik ID
            localStorage.setItem('discordUserTag', `${user.username}#${user.discriminator}`);
            localStorage.setItem('discordUserID', user.id);
            showAllSections();
            alert(`Logget ind som ${user.username}#${user.discriminator}`);
            window.history.replaceState({}, document.title, window.location.pathname);
        })
        .catch(err => console.log("Discord API fejl:", err));
    } else {
        if(localStorage.getItem('discordLoggedIn') === 'true') {
            showAllSections();
        } else {
            hideAllSectionsExceptLogin();
        }
    }
}

function showAllSections() {
    document.getElementById('login-section').style.display = 'none';
    document.querySelectorAll('.section').forEach(sec => sec.style.display='block');
}

function hideAllSectionsExceptLogin() {
    document.getElementById('login-section').style.display = 'block';
    document.querySelectorAll('.section').forEach(sec => {
        if(sec.id !== 'login-section') sec.style.display='none';
    });
}

getDiscordUser();

// ----- DISCORD WEBHOOK -----
const webhookURL = "https://discord.com/api/webhooks/1491550284353372311/yA0sTjy1UpuIvIahY9ImvqT4wwoh2du7PPJwkuuv9RnY660oy3KS3-JYOCfocKTyUDag";

function submitApp(type) {
    if(localStorage.getItem('discordLoggedIn') !== 'true') {
        alert("Du skal logge ind med Discord først!");
        return;
    }

    let data = {};
    for (let i = 1; i <= 10; i++) {
        const el = document.getElementById(`${type[0].toLowerCase()}_q${i}`);
        data[`Q${i}`] = el ? el.value : '';
        if(el) el.value = '';
    }

    // Tilføj Discord oplysninger
    data['DiscordTag'] = localStorage.getItem('discordUserTag');
    data['DiscordID'] = localStorage.getItem('discordUserID');

    let apps = JSON.parse(localStorage.getItem('apps') || '[]');
    const appData = {id: Date.now(), type, status: 'Ny', ...data};
    apps.push(appData);
    localStorage.setItem('apps', JSON.stringify(apps));

    sendToDiscord(type + " Ansøgning", appData);
    loadApps();
    alert(type + " ansøgning sendt!");
}

function sendToDiscord(title, dataObj, status="Ny") {
    fetch(webhookURL, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: "Resident RP",
            embeds: [{
                title: title + " - " + status,
                color: status === "Godkendt" ? 65280 : status === "Afvist" ? 16711680 : 16766720,
                fields: Object.keys(dataObj)
                    .filter(k => !['id','type','status'].includes(k))
                    .map(key => ({name: key.toUpperCase(), value: String(dataObj[key]), inline:false})),
                footer: { text: "Resident RP Ansøgning System" }
            }]
        })
    }).catch(err => console.log("Fejl ved Discord webhook:", err));
}

function setStatus(id, status) {
    let apps = JSON.parse(localStorage.getItem('apps') || '[]');
    let app = apps.find(a => a.id === id);
    if(!app) return;
    app.status = status;
    localStorage.setItem('apps', JSON.stringify(apps));
    sendToDiscord(app.type + " Ansøgning", app, status);
    loadApps();
}

let currentFilter = 'All';
function filterApps(type) {
    currentFilter = type;
    loadApps();
}

function loadApps() {
    const appsDiv = document.getElementById('apps');
    let apps = JSON.parse(localStorage.getItem('apps') || '[]');
    appsDiv.innerHTML = '';

    let filtered = apps.filter(a => 
        (currentFilter === 'All' || a.type === currentFilter) &&
        a.status === 'Ny'
    );

    if(filtered.length === 0){
        appsDiv.innerHTML = "<p>Ingen ansøgninger endnu.</p>";
        return;
    }

    filtered.forEach(app => {
        const typeClass = app.type === "Whitelist" ? "whitelist" : app.type === "Staff" ? "staff" : "bande";
        const card = document.createElement('div');
        card.className = `app-card ${typeClass}`;
        card.style.borderTop = `5px solid #f1c40f`;

        let html = `<h3>${app.type} - ${app.status}</h3>`;
        Object.keys(app).forEach(k => {
            if(!['id','type','status'].includes(k)){
                html += `<div class="field"><b>${k}:</b> ${app[k]}</div>`;
            }
        });

        html += `<div class="status-buttons">
                    <button onclick="setStatus(${app.id}, 'Godkendt')">✅ Godkend</button>
                    <button onclick="setStatus(${app.id}, 'Afvist')">❌ Afvis</button>
                 </div>`;

        card.innerHTML = html;
        appsDiv.appendChild(card);
    });
}

loadApps();
</script>
</body>
</html>
