<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Syndicate 16+</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  background: #111827;
}

nav a {
  margin-left: 20px;
  color: #ccc;
  cursor: pointer;
}

nav a:hover {
  color: white;
}

/* HERO */
.hero {
  height: 90vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  background: linear-gradient(rgba(15,23,42,0.8), rgba(15,23,42,0.9)),
              url('https://images.unsplash.com/photo-1508057198894-247b23fe5ade') center/cover;
}

.hero h1 {
  font-size: 60px;
}

.hero p {
  color: #94a3b8;
  margin: 10px 0 30px;
}

.btn {
  padding: 12px 25px;
  border-radius: 8px;
  text-decoration: none;
  cursor: pointer;
}

.primary {
  background: #5865F2;
}

.primary:hover {
  background: #4752c4;
}

/* SECTIONS */
.section {
  padding: 40px;
}

.hidden {
  display: none;
}

/* FORM */
input, select, textarea {
  display: block;
  width: 300px;
  margin: 10px 0;
  padding: 10px;
  border-radius: 6px;
  border: none;
}

/* BUTTON */
button {
  padding: 10px 20px;
  border: none;
  background: #5865F2;
  color: white;
  cursor: pointer;
  border-radius: 6px;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
}

.approve { background: green; }
.reject { background: red; margin-left: 10px; }

/* FEATURES */
.features {
  padding: 60px;
  text-align: center;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
}

.card-box {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>
  <div>Syndicate 16+</div>
  <nav>
    <a onclick="show('home')">Forside</a>
    <a onclick="show('form')">Ansøg</a>
    <a onclick="show('admin')">Admin</a>
  </nav>
</header>

<!-- FORSIDE -->
<div id="home">
  <section class="hero">
    <div>
      <h1>Syndicate 16+</h1>
      <p>Realistisk roleplay uden kompromiser</p>
      <button class="btn primary" onclick="show('form')">Ansøg Whitelist</button>
    </div>
  </section>

  <section class="features">
    <h2>Hvorfor vælge os?</h2>
    <div class="cards">
      <div class="card-box">🎭 Seriøst RP</div>
      <div class="card-box">👮 Aktive fraktioner</div>
      <div class="card-box">🌆 Custom scripts</div>
      <div class="card-box">🤝 Stærkt community</div>
    </div>
  </section>
</div>

<!-- FORM -->
<div id="form" class="section hidden">
  <h2>Lav en ansøgning</h2>

  <select id="type" onchange="loadQuestions()">
    <option value="Whitelist">Whitelist</option>
    <option value="Staff">Staff</option>
    <option value="Bande">Bande</option>
  </select>

  <div id="questions"></div>

  <button onclick="sendApplication()">Send</button>
</div>

<!-- ADMIN -->
<div id="admin" class="section hidden">
  <h2>Ansøgninger</h2>
  <div id="applications"></div>
</div>

<script>
let WEBHOOK_URL = "https://discordapp.com/api/webhooks/1494677792707579975/q9AK_e1uVhIS4Gj40U14s0MOfWb9CNn8hIBKg3EUXdA9x9aEha6rLlyRb7OxOuaFMsem";

const questionSets = {
  Whitelist: [
    "Hvad er dit navn?",
    "Hvor gammel er du?",
    "Hvorfor vil du spille her?",
    "Hvad er RP?",
    "Har du erfaring?",
    "Beskriv din karakter",
    "Hvordan håndterer du konflikter?",
    "Kender du reglerne?",
    "Hvad vil du bidrage med?",
    "Andet?"
  ],
  Staff: [
    "Navn?",
    "Alder?",
    "Hvorfor staff?",
    "Erfaring?",
    "Konflikthåndtering?",
    "Aktivitet?",
    "Hvad er god RP?",
    "Hvordan hjælper du spillere?",
    "Hvad gør en god admin?",
    "Andet?"
  ],
  Bande: [
    "Bandens navn?",
    "Medlemmer?",
    "Historie?",
    "Mål?",
    "Type bande?",
    "RP stil?",
    "Erfaring?",
    "Konflikter?",
    "Unikhed?",
    "Andet?"
  ]
};

function loadQuestions() {
  let type = document.getElementById("type").value;
  let container = document.getElementById("questions");
  container.innerHTML = "";

  questionSets[type].forEach((q, i) => {
    container.innerHTML += `
      <label>${q}</label>
      <textarea id="q${i}"></textarea>
    `;
  });
}

function show(section) {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("form").classList.add("hidden");
  document.getElementById("admin").classList.add("hidden");

  document.getElementById(section).classList.remove("hidden");

  if(section === "form") loadQuestions();
}

function sendApplication() {
  let type = document.getElementById("type").value;
  let answers = [];

  questionSets[type].forEach((q, i) => {
    let answer = document.getElementById(`q${i}`).value;
    answers.push(`**${q}**\n${answer}`);
  });

  let content = `📥 **Ny ${type} ansøgning**\n\n${answers.join("\n\n")}`;

  fetch(WEBHOOK_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      content: content
    })
  });

  alert("Ansøgning sendt til Discord!");
}
</script>

</body>
</html>
