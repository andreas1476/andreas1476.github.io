<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Resident RP</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 20px;
  background: #111827;
}

nav a {
  margin-left: 15px;
  color: #ccc;
  cursor: pointer;
}

.section {
  padding: 40px;
}

input, select, textarea {
  display: block;
  width: 300px;
  margin: 10px 0;
  padding: 10px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 10px 20px;
  border: none;
  background: #5865F2;
  color: white;
  cursor: pointer;
  border-radius: 6px;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
}

.approve { background: green; }
.reject { background: red; margin-left: 10px; }

.hidden { display: none; }
</style>
</head>

<body>

<header>
  <div>Resident RP</div>
  <nav>
    <a onclick="show('form')">Ansøg</a>
    <a onclick="show('admin')">Admin Panel</a>
  </nav>
</header>

<!-- FORM -->
<div id="form" class="section">
  <h2>Lav en ansøgning</h2>

  <select id="type">
    <option>Whitelist</option>
    <option>Staff</option>
    <option>Bande</option>
  </select>

  <input id="name" placeholder="Navn">
  <textarea id="text" placeholder="Din ansøgning"></textarea>

  <button onclick="sendApplication()">Send</button>
</div>

<!-- ADMIN -->
<div id="admin" class="section hidden">
  <h2>Ansøgninger</h2>
  <div id="applications"></div>
</div>

<script>
let apps = JSON.parse(localStorage.getItem("apps")) || [];

function save() {
  localStorage.setItem("apps", JSON.stringify(apps));
}

function show(section) {
  document.getElementById("form").classList.add("hidden");
  document.getElementById("admin").classList.add("hidden");

  document.getElementById(section).classList.remove("hidden");
  render();
}

function sendApplication() {
  let app = {
    id: Date.now(),
    type: document.getElementById("type").value,
    name: document.getElementById("name").value,
    text: document.getElementById("text").value
  };

  apps.push(app);
  save();
  alert("Ansøgning sendt!");
}

function render() {
  let container = document.getElementById("applications");
  container.innerHTML = "";

  apps.forEach(app => {
    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${app.type}</b><br>
      ${app.name}<br>
      ${app.text}<br><br>
      <button class="approve" onclick="approve(${app.id})">Godkend</button>
      <button class="reject" onclick="reject(${app.id})">Afvis</button>
    `;

    container.appendChild(div);
  });
}

function approve(id) {
  apps = apps.filter(a => a.id !== id);
  save();
  render();
}

function reject(id) {
  apps = apps.filter(a => a.id !== id);
  save();
  render();
}
</script>

</body>
</html>
