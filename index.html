<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Syndicate 16+</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: #0b0f0c;
        color: white;
    }

    /* NAVBAR */
    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 60px;
        background: rgba(0,0,0,0.6);
        position: fixed;
        width: 100%;
        top: 0;
        z-index: 100;
        backdrop-filter: blur(10px);
    }

    .logo {
        font-size: 20px;
        font-weight: bold;
        color: #39ff14;
    }

    nav a {
        color: white;
        margin-left: 20px;
        text-decoration: none;
        transition: 0.3s;
    }

    nav a:hover {
        color: #39ff14;
    }

    /* HERO */
    .hero {
        height: 100vh;
        background: url('https://images.unsplash.com/photo-1504274066651-8d31a536b11a?auto=format&fit=crop&w=1600&q=80') no-repeat center/cover;
        display: flex;
        align-items: center;
        padding: 0 60px;
        position: relative;
    }

    .overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.75);
    }

    .hero-content {
        position: relative;
        max-width: 700px;
    }

    .hero h1 {
        font-size: 60px;
        font-weight: bold;
    }

    .hero h1 span {
        color: #39ff14;
    }

    .hero p {
        margin-top: 15px;
        color: #ccc;
        line-height: 1.5;
    }

    .buttons {
        margin-top: 25px;
    }

    .btn {
        padding: 12px 20px;
        margin-right: 10px;
        border: none;
        cursor: pointer;
        font-weight: bold;
        border-radius: 5px;
        transition: 0.3s;
    }

    .btn-green {
        background: #39ff14;
        color: black;
    }

    .btn-green:hover {
        background: #2ecc10;
    }

    .btn-dark {
        background: transparent;
        border: 2px solid white;
        color: white;
    }

    .btn-dark:hover {
        border-color: #39ff14;
        color: #39ff14;
    }

    /* STATS */
    .stats {
        position: absolute;
        bottom: 40px;
        left: 60px;
        display: flex;
        gap: 40px;
    }

    .stat {
        background: rgba(0,0,0,0.6);
        padding: 15px 20px;
        border-radius: 10px;
        border: 1px solid #222;
        min-width: 150px;
    }

    .stat h3 {
        color: #39ff14;
        font-size: 20px;
    }

    .stat p {
        font-size: 12px;
        color: #aaa;
    }

</style>

</head>
<body>

<header>
    <div class="logo">Syndicate 16+</div>
    <nav>
        <a href="#">Forside</a>
        <a href="#">Ansøg</a>
        <a href="#">Admin</a>
    </nav>
</header>

<section class="hero">
    <div class="overlay"></div>

    <div class="hero-content">
        <h1>SYNDICATE <span>16+</span></h1>
        <p>
            Realistisk roleplay uden kompromiser.<br>
            Velkommen til Syndicate 16+ – en seriøs dansk FiveM roleplay server,
            hvor fællesskab, realisme og respekt er i centrum.
        </p>

        <div class="buttons">
            <button class="btn btn-green">ANSØG WHITELIST</button>
            <button class="btn btn-dark">JOIN DISCORD</button>
        </div>
    </div>

    <div class="stats">
        <div class="stat">
            <h3>87</h3>
            <p>Aktive spillere</p>
        </div>

        <div class="stat">
            <h3>AKTIV</h3>
            <p>Whitelist status</p>
        </div>

        <div class="stat">
            <h3>ONLINE</h3>
            <p>Server status</p>
        </div>

        <div class="stat">
            <h3>2024</h3>
            <p>Etableret</p>
        </div>
    </div>

</section>

</body>
</html>
