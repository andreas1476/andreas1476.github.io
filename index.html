<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resident RP</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body {margin:0;font-family:'Poppins',sans-serif;background:#0b0b0b;color:white;}
nav {display:flex;justify-content:space-between;padding:20px 40px;background:#111;position:fixed;width:100%;top:0;z-index:1000;}
nav h2 {color:#f1c40f;}
nav a {color:white;margin-left:20px;text-decoration:none;}
header {height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:#000;}
h1 {font-size:60px;margin:0;}
p {color:#ccc;max-width:600px;}
.btn {padding:15px 30px;border-radius:10px;text-decoration:none;font-weight:600;margin:10px;display:inline-block;}
.join {background:#f1c40f;color:black;}
.discord {background:#5865F2;}
section {padding:80px 20px;text-align:center;}
.form {max-width:500px;margin:auto;text-align:left;}
input, textarea {width:100%;padding:10px;margin:10px 0;border-radius:8px;border:none;}
button {padding:12px 20px;border:none;border-radius:8px;background:#f1c40f;font-weight:bold;}
.shop {display:flex;justify-content:center;flex-wrap:wrap;}
.shop-item {background:#1a1a1a;margin:15px;padding:20px;border-radius:15px;width:250px;}
footer {padding:30px;background:#111;text-align:center;color:#777;}
</style>
</head>
<body>

<nav>
<h2>Resident RP</h2>
<div>
<a href="#">Hjem</a>
<a href="#whitelist">Whitelist</a>
<a href="#staff">Staff</a>
<a href="#bande">Bande</a>
<a href="#donation">Donation</a>
</div>
</nav>

<header>
<h1>RESIDENT RP</h1>
<p>Danmarks fedeste FiveM RP server</p>
<a class="btn join" href="fivem://connect/DIN-IP-HER">Join Server</a>
<a class="btn discord" href="https://discord.gg/8cS9Mz3PBZ">Discord</a>
</header>

<section id="whitelist">
<h2>📋 Whitelist Ansøgning</h2>
<div class="form">
<input placeholder="Navn">
<input placeholder="Alder">
<textarea placeholder="RP erfaring"></textarea>
<textarea placeholder="Hvorfor vil du spille?"></textarea>
<button>Send ansøgning</button>
</div>
</section>

<section id="staff">
<h2>🛠️ Staff Ansøgning</h2>
<div class="form">
<input placeholder="Navn">
<input placeholder="Alder">
<textarea placeholder="Erfaring som staff"></textarea>
<textarea placeholder="Hvorfor dig?"></textarea>
<button>Send ansøgning</button>
</div>
</section>

<section id="bande">
<h2>🔫 Bande Ansøgning</h2>
<div class="form">
<input placeholder="Bande navn">
<input placeholder="Medlemmer">
<textarea placeholder="Planer for banden"></textarea>
<button>Send ansøgning</button>
</div>
</section>

<section id="donation">
<h2>💰 Donation / VIP</h2>
<div class="shop">
<div class="shop-item">VIP Bronze<br>50 kr</div>
<div class="shop-item">VIP Silver<br>100 kr</div>
<div class="shop-item">VIP Gold<br>200 kr</div>
</div>
<p>Kontakt os på Discord for køb</p>
</section>

<footer>
<p>© 2026 Resident RP</p>
</footer>

<script>
const webhookURL = "https://discord.com/api/webhooks/1491550284353372311/yA0sTjy1UpuIvIahY9ImvqT4wwoh2du7PPJwkuuv9RnY660oy3KS3-JYOCfocKTyUDag";

function sendToDiscord(title, data) {
  fetch(webhookURL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: "Resident RP Ansøgning",
      embeds: [{
        title: title,
        description: data,
        color: 16766720
      }]
    })
  });
}

// Hook forms
const forms = document.querySelectorAll('.form');
forms[0].querySelector('button').onclick = () => {
  const inputs = forms[0].querySelectorAll('input, textarea');
  let data = `Navn: ${inputs[0].value}
Alder: ${inputs[1].value}
Erfaring: ${inputs[2].value}
Hvorfor: ${inputs[3].value}`;
  sendToDiscord("Whitelist Ansøgning", data);
  alert("Ansøgning sendt!");
};

forms[1].querySelector('button').onclick = () => {
  const inputs = forms[1].querySelectorAll('input, textarea');
  let data = `Navn: ${inputs[0].value}
Alder: ${inputs[1].value}
Erfaring: ${inputs[2].value}
Hvorfor: ${inputs[3].value}`;
  sendToDiscord("Staff Ansøgning", data);
  alert("Ansøgning sendt!");
};

forms[2].querySelector('button').onclick = () => {
  const inputs = forms[2].querySelectorAll('input, textarea');
  let data = `Bande: ${inputs[0].value}
Medlemmer: ${inputs[1].value}
Planer: ${inputs[2].value}`;
  sendToDiscord("Bande Ansøgning", data);
  alert("Ansøgning sendt!");
};
</script>

</body>
</html>
