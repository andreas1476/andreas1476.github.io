<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resident RP</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body {margin:0;font-family:'Poppins',sans-serif;background:#0b0b0b;color:white;}
nav {display:flex;justify-content:space-between;padding:20px 40px;background:#111;position:fixed;width:100%;top:0;z-index:1000;}
nav h2 {color:#f1c40f;}
nav a {color:white;margin-left:20px;text-decoration:none;}
header {height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:#000;}
.btn {padding:15px 30px;border-radius:10px;text-decoration:none;font-weight:600;margin:10px;display:inline-block;}
.join {background:#f1c40f;color:black;}
.discord {background:#5865F2;}
section {padding:80px 20px;text-align:center;}
.form {max-width:500px;margin:auto;text-align:left;}
input, textarea {width:100%;padding:10px;margin:10px 0;border-radius:8px;border:none;}
button {padding:12px 20px;border:none;border-radius:8px;background:#f1c40f;font-weight:bold;cursor:pointer;}
.admin-panel {display:none;max-width:800px;margin:auto;text-align:left;background:#111;padding:20px;border-radius:10px;}
.app {background:#1a1a1a;padding:10px;margin:10px 0;border-radius:8px;}
footer {padding:30px;background:#111;text-align:center;color:#777;}
</style>
</head>
<body>

<nav>
<h2>Resident RP</h2>
<div>
<a href="#">Hjem</a>
<a href="#whitelist">Whitelist</a>
<a href="#staff">Staff</a>
<a href="#bande">Bande</a>
<a href="#admin">Admin</a>
</div>
</nav>

<header>
<h1>RESIDENT RP</h1>
<a class="btn join" href="#">Join Server</a>
<a class="btn discord" href="https://discord.gg/fv9zQXZ7vh">Discord</a>
</header>

<!-- WHITELIST -->
<section id="whitelist">
<h2>Whitelist Ansøgning</h2>
<div class="form">
<input id="w_name" placeholder="Navn">
<input id="w_age" placeholder="Alder">
<textarea id="w_exp" placeholder="Erfaring"></textarea>
<textarea id="w_why" placeholder="Hvorfor?"></textarea>
<button onclick="submitWhitelist()">Send</button>
</div>
</section>

<!-- STAFF -->
<section id="staff">
<h2>Staff Ansøgning</h2>
<div class="form">
<input id="s_name" placeholder="Navn">
<input id="s_age" placeholder="Alder">
<textarea id="s_exp" placeholder="Staff erfaring"></textarea>
<textarea id="s_why" placeholder="Hvorfor dig?"></textarea>
<button onclick="submitStaff()">Send</button>
</div>
</section>

<!-- BANDE -->
<section id="bande">
<h2>Bande Ansøgning</h2>
<div class="form">
<input id="b_name" placeholder="Bande navn">
<input id="b_members" placeholder="Antal medlemmer">
<textarea id="b_plan" placeholder="Planer"></textarea>
<button onclick="submitBande()">Send</button>
</div>
</section>

<!-- ADMIN -->
<section id="admin">
<h2>🔐 Admin Panel</h2>
<input type="password" id="adminPass" placeholder="Kodeord">
<button onclick="login()">Login</button>

<div class="admin-panel" id="panel">
<h3>Ansøgninger</h3>
<div id="apps"></div>
</div>
</section>

<footer>
<p>© Resident RP</p>
</footer>

<script>
const webhookURL = "https://discord.com/api/webhooks/1491550284353372311/yA0sTjy1UpuIvIahY9ImvqT4wwoh2du7PPJwkuuv9RnY660oy3KS3-JYOCfocKTyUDag";
const adminPassword = "resident1234";

// Funktion til at sende beskeder til Discord
function sendToDiscord(title, dataObj, status="Ny") {
  fetch(webhookURL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: "Resident RP",
      embeds: [{
        title: title + " - " + status,
        color: status === "Godkendt" ? 65280 : status === "Afvist" ? 16711680 : 16766720,
        fields: Object.keys(dataObj).map(key => ({
          name: key.toUpperCase(),
          value: String(dataObj[key]),
          inline: false
        })),
        footer: { text: "Resident RP Ansøgning System" }
      }]
    })
  });
}

// Gemmer ansøgning i localStorage
function saveApp(type, data) {
  let apps = JSON.parse(localStorage.getItem('apps') || '[]');
  apps.push({id: Date.now(), type, status: "Ny", ...data});
  localStorage.setItem('apps', JSON.stringify(apps));
}

// WHITELIST
function submitWhitelist() {
  let data = {name: w_name.value, age: w_age.value, exp: w_exp.value, why: w_why.value};
  saveApp("Whitelist", data);
  sendToDiscord("Whitelist Ansøgning", data);
  alert('Sendt!');
}

// STAFF
function submitStaff() {
  let data = {name: s_name.value, age: s_age.value, exp: s_exp.value, why: s_why.value};
  saveApp("Staff", data);
  sendToDiscord("Staff Ansøgning", data);
  alert('Sendt!');
}

// BANDE
function submitBande() {
  let data = {name: b_name.value, members: b_members.value, plan: b_plan.value};
  saveApp("Bande", data);
  sendToDiscord("Bande Ansøgning", data);
  alert('Sendt!');
}

// ADMIN LOGIN
function login() {
  if(adminPass.value === adminPassword) {
    panel.style.display = 'block';
    loadApps();
  } else alert('Forkert kode');
}

// LOAD APPS
function loadApps() {
  let apps = JSON.parse(localStorage.getItem('apps') || '[]');
  appsDiv.innerHTML = '';
  apps.forEach(a => {
    if(a.status === "Ny") {
      appsDiv.innerHTML += `
        <div class="app">
          <b>${a.type}</b> - ${a.name || a.b_name}<br>
          ${Object.keys(a).filter(k => !["id","type","status"].includes(k)).map(k => `<b>${k}:</b> ${a[k]}<br>`).join('')}
          <button onclick="handleApp(${a.id}, true)">✅ Godkend</button>
          <button onclick="handleApp(${a.id}, false)">❌ Afvis</button>
        </div>
      `;
    }
  });
}

// GODKEND / AFVIS
function handleApp(id, approve) {
  let apps = JSON.parse(localStorage.getItem('apps') || '[]');
  let app = apps.find(a => a.id === id);
  if(!app) return;

  app.status = approve ? "Godkendt" : "Afvist";
  localStorage.setItem('apps', JSON.stringify(apps));
  
  sendToDiscord(app.type + " Ansøgning", app, app.status);
  loadApps(); // opdater panel
}
</script>
